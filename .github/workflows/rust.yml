name: Rust

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - 'benches/**'
      - 'Dockerfile'
      - '.cargo/audit.toml'
      - '.github/workflows/rust.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'build.rs'
      - 'benches/**'
      - 'Dockerfile'
      - '.cargo/audit.toml'
      - '.github/workflows/rust.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y libpcap-dev libelf-dev zlib1g-dev clang llvm pkg-config
    - name: Check formatting
      run: cargo fmt --check
    # --workspace --all-targets so the library crates (rustnet-core/-capture/
    # -host) are linted, built, and tested too. The workspace root is a real
    # package (rustnet-monitor), so a bare `cargo {clippy,build,test}` only
    # selects the binary and silently skips the library crates' lints, tests,
    # and doctests.
    - name: Run clippy
      run: cargo clippy --workspace --all-targets -- -D warnings
    - name: Build
      run: cargo build --workspace --all-targets --verbose
    - name: Run tests
      run: cargo test --workspace --verbose
    - name: Install cargo-audit
      run: cargo install cargo-audit --locked
    - name: Run security audit
      # Fail the build on advisories and on yanked crates so a withdrawn
      # dependency (e.g. a yanked release pinned in Cargo.lock) is caught in CI.
      run: cargo audit

  docker:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
    - name: Build Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: .
        push: false
        load: true
        tags: rustnet:ci-test
    - name: Verify Docker image
      run: docker run --rm rustnet:ci-test --version
