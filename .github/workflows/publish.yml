name: Publish to crates.io

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libpcap-dev libelf-dev zlib1g-dev clang llvm pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')
          # Check if this version already exists on crates.io
          if cargo search "$NAME" --limit 1 | grep -q "\"$VERSION\""; then
            echo "⚠️  $NAME@$VERSION already published to crates.io, skipping"
          else
            cargo publish
          fi
